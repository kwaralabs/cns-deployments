name: Build & Push Frappe Image

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
    paths:
      - "Dockerfile"
      - "entrypoints/**"
      - "apps.json"
      - ".github/workflows/build-image.yml"
  workflow_dispatch:
    inputs:
      push_latest:
        description: "Also tag as :latest"
        type: boolean
        default: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/frappe-cns

jobs:
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate APPS_JSON_BASE64
        id: apps_json
        run: echo "APPS_JSON_BASE64=$(base64 -w 0 apps.json)" >> $GITHUB_OUTPUT

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || inputs.push_latest == true }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            FRAPPE_PATH=https://github.com/frappe/frappe
            FRAPPE_BRANCH=version-16
            PYTHON_VERSION=3.14
            NODE_VERSION=24
            APPS_JSON_BASE64=${{ steps.apps_json.outputs.APPS_JSON_BASE64 }}
          platforms: linux/amd64

      - name: Image digest
        run: echo "Pushed ${{ steps.meta.outputs.tags }}"

  validate-compose:
    name: Validate all brand compose files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate compose files
        run: |
          for f in brands/*/docker-compose.yml; do
            brand=$(basename $(dirname $f))
            echo "Validating $f ..."
            env $(grep -v '^#' brands/$brand/.env.example | grep '=' | sed 's/=.*/=placeholder/' | xargs) \
              docker compose -f "$f" config --quiet \
              && echo "  OK: $f" \
              || echo "  FAIL: $f"
          done