# =============================================================================
# ERPNext — BrazenHalo
# Brand:       BRAZENHALO
# Source:      Pulled by Dokploy from Git (brands/brazenhalo/docker-compose.yml)
# Image:       Built by Dokploy from ./Dockerfile in the same repo
# Environments: dev | test | demo | prod — controlled via env vars in Dokploy
#
# HOW DOKPLOY USES THIS FILE:
#   1. Dokploy pulls this file from your Git repo on every deploy trigger.
#   2. Dokploy builds the image from ./Dockerfile using the build args below.
#      In Dokploy application settings → Build tab:
#        Build type:    Dockerfile
#        Dockerfile:    ./Dockerfile          (relative to repo root)
#        Build context: .                     (repo root)
#   3. Dokploy injects all [SECRET] variables from its own env var store.
#   4. Dokploy manages the reverse proxy (Traefik) separately — configure the
#      domain and port in the Dokploy application UI, not via labels here.
#
# IMAGE TAGGING (set IMAGE_TAG in Dokploy per environment):
#   dev:   dev-<short-sha>    rebuilt on every push, floating
#   test:  v15.28.1-r3        pinned — promoted from dev, never rebuilt
#   prod:  v15.28.1-r3        same tag as test — binary-identical
# =============================================================================

# x-frappe-build defines the build config shared by all Frappe services.
# Dokploy builds this once and reuses the resulting image for every service
# that references it. All services in this stack use the same image — they
# differ only in their `command:`.
x-frappe-build: &frappe-build
  build:
    context: ${BUILD_CONTEXT:-.}
    dockerfile: ${DOCKERFILE:-./Dockerfile}
    args:
      # Pinned versions — set these as build args in Dokploy Build tab.
      # Changing any arg busts the build cache and triggers a full rebuild.
      FRAPPE_VERSION: ${FRAPPE_VERSION:-version-15}
      ERPNEXT_VERSION: ${ERPNEXT_VERSION:-version-15}
      HRMS_VERSION: ${HRMS_VERSION:-version-15}
      CRM_VERSION: ${CRM_VERSION:-2.x}
      PYTHON_VERSION: ${PYTHON_VERSION:-3.11.6}
      NODE_VERSION: ${NODE_VERSION:-18.18.2}
  # Image name Dokploy tags the built image with.
  # Set IMAGE_TAG in Dokploy env — same tag promotes through dev→test→prod.
  image: ${IMAGE_REGISTRY:-ghcr.io/kwaralabs}/frappe-base:${IMAGE_TAG:-dev}

# Env vars shared by every Frappe process
x-frappe-env: &frappe-env
  # --- Site identity [ENV: set per environment in Dokploy] ---
  FRAPPE_SITE_NAME: ${FRAPPE_SITE_NAME:?FRAPPE_SITE_NAME must be set in Dokploy}
  # --- Database [CONFIG: internal service name, never changes] ---
  DB_HOST: mariadb
  DB_PORT: "3306"
  # --- Database credentials [SECRET: set in Dokploy — never commit values] ---
  MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD must be set in Dokploy}
  MYSQL_USER: ${MYSQL_USER:-frappe}
  MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD must be set in Dokploy}
  MYSQL_DATABASE: ${MYSQL_DATABASE:-_frappe_brazenhalo}
  # --- Redis [CONFIG: fixed internal service names] ---
  REDIS_CACHE: redis-cache:6379
  REDIS_QUEUE: redis-queue:6379
  # --- Admin [SECRET: set in Dokploy — used only on first-boot site creation] ---
  ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD must be set in Dokploy}
  # --- Apps to install on first boot [CONFIG] ---
  # Must match exactly the app names baked into the image via Dockerfile.
  # Comma-separated. Order matters — install frappe deps before dependents.
  INSTALL_APPS: ${INSTALL_APPS:-erpnext,hrms,crm}

# Healthcheck gate reused by all Frappe app services
x-depends-ready: &depends-ready
  mariadb:
    condition: service_healthy
  redis-cache:
    condition: service_healthy
  redis-queue:
    condition: service_healthy

# Shared volume mounts for all Frappe app services
x-frappe-volumes: &frappe-volumes
  - bh-sites:/home/frappe/frappe-bench/sites
  - bh-logs:/home/frappe/frappe-bench/logs

services:

  # ---------------------------------------------------------------------------
  # CONFIGURATOR
  # One-shot init container. Dokploy runs this on every deploy.
  # First boot:   creates the Frappe site, installs apps from INSTALL_APPS.
  # Subsequent:   detects site_config.json, runs bench migrate only.
  # Idempotent:   safe to re-run — the site-exists check guards new-site.
  # ---------------------------------------------------------------------------
  configurator:
    <<: *frappe-build
    command: >
      bash -c "
        echo '[configurator] Waiting for MariaDB...' &&
        wait-for-it mariadb:3306 --timeout=120 --strict &&
        echo '[configurator] Waiting for Redis...' &&
        wait-for-it redis-cache:6379 --timeout=30 --strict &&
        wait-for-it redis-queue:6379 --timeout=30 --strict &&
        SITE_CONFIG=/home/frappe/frappe-bench/sites/$$FRAPPE_SITE_NAME/site_config.json &&
        if [ ! -f $$SITE_CONFIG ]; then
          echo '[configurator] First boot — creating site...' &&
          bench new-site $$FRAPPE_SITE_NAME
            --mariadb-root-password $$MYSQL_ROOT_PASSWORD
            --admin-password $$ADMIN_PASSWORD
            --db-type mariadb
            --db-host mariadb
            --db-port 3306
            --no-mariadb-socket &&
          echo '[configurator] Installing apps: '$$INSTALL_APPS &&
          for app in $$(echo $$INSTALL_APPS | tr ',' ' '); do
            echo \"[configurator] Installing $$app...\" &&
            bench --site $$FRAPPE_SITE_NAME install-app $$app;
          done &&
          echo '[configurator] First boot complete.';
        else
          echo '[configurator] Site exists — running migrations...' &&
          bench --site $$FRAPPE_SITE_NAME migrate &&
          echo '[configurator] Migrations complete.';
        fi
      "
    environment:
      <<: *frappe-env
    volumes: *frappe-volumes
    depends_on:
      mariadb:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
      redis-queue:
        condition: service_healthy
    networks:
      - bh-internal
    restart: "no"

  # ---------------------------------------------------------------------------
  # BACKEND
  # Gunicorn WSGI server. Starts only after configurator exits successfully.
  # Not exposed externally — frontend (nginx) proxies all traffic to it.
  # ---------------------------------------------------------------------------
  backend:
    <<: *frappe-build
    command: bench serve --port 8000
    environment:
      <<: *frappe-env
    volumes: *frappe-volumes
    depends_on:
      <<: *depends-ready
      configurator:
        condition: service_completed_successfully
    networks:
      - bh-internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/method/ping"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  # ---------------------------------------------------------------------------
  # FRONTEND
  # Nginx — serves compiled JS/CSS assets and proxies to backend + websocket.
  #
  # Dokploy proxy setup (configure in the Dokploy application UI):
  #   Domain:  erp.brazenhalo.com  (prod) | bh-dev.internal (dev)
  #   Port:    8080
  #   HTTPS:   enabled — Dokploy handles TLS via its Traefik instance
  # Do NOT add Traefik labels here — Dokploy injects them automatically.
  # ---------------------------------------------------------------------------
  frontend:
    <<: *frappe-build
    command: nginx-entrypoint.sh
    environment:
      FRAPPE_SITE_NAME: ${FRAPPE_SITE_NAME:?FRAPPE_SITE_NAME must be set in Dokploy}
      BACKEND: backend:8000
      SOCKETIO: websocket:9000
      UPSTREAM_REAL_IP_ADDRESS: ${UPSTREAM_REAL_IP_ADDRESS:-127.0.0.1}
      UPSTREAM_REAL_IP_HEADER: ${UPSTREAM_REAL_IP_HEADER:-X-Forwarded-For}
      UPSTREAM_REAL_IP_RECURSIVE: ${UPSTREAM_REAL_IP_RECURSIVE:-off}
      FRAPPE_SITE_NAME_HEADER: $$host
      PROXY_READ_TIMEOUT: ${PROXY_READ_TIMEOUT:-120}
      CLIENT_MAX_BODY_SIZE: ${CLIENT_MAX_BODY_SIZE:-50m}
    ports:
      # Port Dokploy's Traefik proxy connects to.
      # Use different FRONTEND_PORT values per environment on shared nodes:
      #   prod=8080  dev=8080  test=8081  demo=8082
      - "${FRONTEND_PORT:-8080}:8080"
    volumes:
      - bh-sites:/home/frappe/frappe-bench/sites:ro
    depends_on:
      backend:
        condition: service_healthy
      websocket:
        condition: service_started
    networks:
      - bh-internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ---------------------------------------------------------------------------
  # WEBSOCKET
  # Node.js socketio — Frappe realtime (live form updates, notifications).
  # ---------------------------------------------------------------------------
  websocket:
    <<: *frappe-build
    command: node /home/frappe/frappe-bench/apps/frappe/socketio.js
    environment:
      <<: *frappe-env
    volumes: *frappe-volumes
    depends_on:
      <<: *depends-ready
      configurator:
        condition: service_completed_successfully
    networks:
      - bh-internal
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # SCHEDULER
  # Frappe APScheduler — flushes email queue, triggers background jobs,
  # runs scheduled reports. Single instance only — never scale this.
  # ---------------------------------------------------------------------------
  scheduler:
    <<: *frappe-build
    command: bench schedule
    environment:
      <<: *frappe-env
    volumes: *frappe-volumes
    depends_on:
      <<: *depends-ready
      configurator:
        condition: service_completed_successfully
    networks:
      - bh-internal
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # QUEUE WORKERS
  # rq workers consuming Frappe's job queues from Redis.
  # Dokploy uses plain Compose — not Swarm — so deploy.replicas is ignored.
  # Scale by adding named sibling services (queue-short-2 etc.) if needed.
  #
  # short:    email sends, webhooks, lightweight form triggers
  # long:     report generation, data imports, bulk operations
  # default:  general purpose fallback
  # ---------------------------------------------------------------------------
  queue-short:
    <<: *frappe-build
    command: bench worker --queue short
    environment:
      <<: *frappe-env
    volumes: *frappe-volumes
    depends_on:
      <<: *depends-ready
      configurator:
        condition: service_completed_successfully
    networks:
      - bh-internal
    restart: unless-stopped

  queue-long:
    <<: *frappe-build
    command: bench worker --queue long
    environment:
      <<: *frappe-env
    volumes: *frappe-volumes
    depends_on:
      <<: *depends-ready
      configurator:
        condition: service_completed_successfully
    networks:
      - bh-internal
    restart: unless-stopped

  queue-default:
    <<: *frappe-build
    command: bench worker --queue default
    environment:
      <<: *frappe-env
    volumes: *frappe-volumes
    depends_on:
      <<: *depends-ready
      configurator:
        condition: service_completed_successfully
    networks:
      - bh-internal
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # MARIADB
  # Dedicated instance — one per brand, never shared across brands in prod.
  # Port 3306 intentionally NOT published to the host.
  # ---------------------------------------------------------------------------
  mariadb:
    image: mariadb:10.6
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
      - --skip-innodb-read-only-compressed
      - --innodb-buffer-pool-size=${MARIADB_INNODB_BUFFER_POOL_SIZE:-512M}
      - --innodb-log-file-size=256M
      - --max-allowed-packet=64M
      - --wait-timeout=28800
      - --interactive-timeout=28800
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD must be set in Dokploy}
      MYSQL_USER: ${MYSQL_USER:-frappe}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD must be set in Dokploy}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-_frappe_brazenhalo}
    volumes:
      - bh-mariadb-data:/var/lib/mysql
      - bh-mariadb-conf:/etc/mysql/conf.d
    networks:
      - bh-internal
    restart: unless-stopped
    healthcheck:
      # Reads from credentials file — password never appears in process args
      # or docker inspect output. File is written by mariadb-init below.
      test: ["CMD", "mysqladmin", "ping", "--defaults-file=/etc/mysql/conf.d/healthcheck.cnf", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  # Writes /etc/mysql/conf.d/healthcheck.cnf before MariaDB healthcheck fires.
  # One-shot — never restarts.
  mariadb-init:
    image: busybox:latest
    command: >
      sh -c "
        printf '[client]\nuser=root\npassword=%s\n' \"$$MYSQL_ROOT_PASSWORD\"
          > /conf/healthcheck.cnf &&
        chmod 600 /conf/healthcheck.cnf &&
        echo '[mariadb-init] Credentials file written.'
      "
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD must be set in Dokploy}
    volumes:
      - bh-mariadb-conf:/conf
    networks:
      - bh-internal
    restart: "no"

  # ---------------------------------------------------------------------------
  # REDIS — CACHE
  # LRU eviction, no persistence. Safe to lose — Frappe rebuilds on restart.
  # ---------------------------------------------------------------------------
  redis-cache:
    image: redis:7-alpine
    command: >
      redis-server
      --maxmemory ${REDIS_CACHE_MAXMEMORY:-256mb}
      --maxmemory-policy allkeys-lru
      --save ""
      --appendonly no
    volumes:
      - bh-redis-cache-data:/data
    networks:
      - bh-internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ---------------------------------------------------------------------------
  # REDIS — QUEUE
  # noeviction + AOF persistence. Queued background jobs must survive restarts.
  # ---------------------------------------------------------------------------
  redis-queue:
    image: redis:7-alpine
    command: >
      redis-server
      --maxmemory ${REDIS_QUEUE_MAXMEMORY:-128mb}
      --maxmemory-policy noeviction
      --appendonly yes
      --appendfilename appendonly.aof
    volumes:
      - bh-redis-queue-data:/data
    networks:
      - bh-internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

# =============================================================================
# VOLUMES
# All prefixed bh- to avoid collision on shared non-prod nodes where multiple
# brand stacks may run on the same Docker host.
# =============================================================================
volumes:
  bh-sites:
    driver: local
  bh-logs:
    driver: local
  bh-mariadb-data:
    driver: local
  bh-mariadb-conf:
    driver: local
  bh-redis-cache-data:
    driver: local
  bh-redis-queue-data:
    driver: local

# =============================================================================
# NETWORKS
# bh-internal: isolated bridge — internal: true blocks internet egress from
#              app services. MariaDB and Redis unreachable from outside.
# No external proxy network — Dokploy attaches its Traefik network
# automatically when you configure the application domain in its UI.
# =============================================================================
networks:
  bh-internal:
    driver: bridge
    internal: true
