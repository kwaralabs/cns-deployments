# ============================================================
# ERPNext + Frappe LMS — Frappe v16 — Dokploy Compose
# Based on: github.com/frappe/frappe_docker
#
# Repo layout (all files must be co-located):
#
#   demo/academy/
#   ├── docker-compose.yml   ← this file
#   ├── Dockerfile
#   └── apps.json
#
# Dokploy compose path:  demo/academy/docker-compose.yml
# build context "."   → resolves to demo/academy/ ✅
#
# Deployment model:
#   GitHub (private) ──webhook──▶ Dokploy ──build──▶ server
#   Image built ON the server. No registry push.
#
# Secrets/toggles → Dokploy → Project → Environment Variables
# apps.json is read directly from the repo — no base64 needed.
#
# One-shot service toggles (replica counts):
#   CONFIGURE=1    → writes common_site_config.json  (first deploy → then 0)
#   CREATE_SITE=1  → creates site + installs apps    (first deploy → then 0)
#   MIGRATE=1      → runs bench migrate               (after upgrades → then 0)
#   ENABLE_DB=1    → runs bundled MariaDB             (0 = external DB)
#
# First deploy:    CONFIGURE=1  CREATE_SITE=1  MIGRATE=0  ENABLE_DB=1
# Normal redeploy: CONFIGURE=0  CREATE_SITE=0  MIGRATE=0  ENABLE_DB=1
# After upgrade:   CONFIGURE=0  CREATE_SITE=0  MIGRATE=1  ENABLE_DB=1
# ============================================================

x-custom-image: &custom_image
  build:
    # "." = demo/academy/ (directory of this compose file) ✅
    # Dockerfile and apps.json must be in the same folder as this file.
    context: .
    dockerfile: Dockerfile
    args:
      FRAPPE_PATH: ${FRAPPE_PATH:-https://github.com/frappe/frappe}
      FRAPPE_BRANCH: ${FRAPPE_BRANCH:-version-16}
      PYTHON_VERSION: ${PYTHON_VERSION:-3.14.0}
      NODE_VERSION: ${NODE_VERSION:-24.0.2}
      # apps.json is copied directly from the build context (same directory
      # as this compose file). Edit apps.json and push to add/remove apps.
  image: frappe-kwaralabs:${VERSION:-version-16}
  pull_policy: never
  deploy:
    restart_policy:
      condition: always

services:

  # ── configurator ────────────────────────────────────────────
  # Writes DB + Redis host/port into common_site_config.json.
  # Idempotent: skips if db_host is already set.
  # Set CONFIGURE=1 on first deploy, then 0.
  configurator:
    <<: *custom_image
    deploy:
      mode: replicated
      replicas: ${CONFIGURE:-0}
      restart_policy:
        condition: none
    entrypoint: ["bash", "-c"]
    command:
      - >
        [[ $${REGENERATE_APPS_TXT} == "1" ]] && ls -1 apps > sites/apps.txt;
        [[ -n `grep -hs ^ sites/common_site_config.json | jq -r ".db_host // empty"` ]] && exit 0;
        bench set-config -g db_host $$DB_HOST;
        bench set-config -gp db_port $$DB_PORT;
        bench set-config -g redis_cache "redis://$$REDIS_CACHE";
        bench set-config -g redis_queue "redis://$$REDIS_QUEUE";
        bench set-config -g redis_socketio "redis://$$REDIS_SOCKETIO";
        bench set-config -gp socketio_port $$SOCKETIO_PORT;
    environment:
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: "3306"
      REDIS_CACHE: redis-cache:6379
      REDIS_QUEUE: redis-queue:6379
      REDIS_SOCKETIO: redis-socketio:6379
      SOCKETIO_PORT: "9000"
      REGENERATE_APPS_TXT: ${REGENERATE_APPS_TXT:-0}
    volumes:
      - sites:/home/frappe/frappe-bench/sites
    networks:
      - bench-network

  # ── create-site ─────────────────────────────────────────────
  # Creates the Frappe site and installs apps defined in INSTALL_APP_ARGS.
  # Idempotent: skips if site directory already exists.
  # Set CREATE_SITE=1 on first deploy, then 0.
  create-site:
    <<: *custom_image
    deploy:
      mode: replicated
      replicas: ${CREATE_SITE:-0}
      restart_policy:
        condition: none
    entrypoint: ["bash", "-c"]
    command:
      - >
        wait-for-it -t 120 $$DB_HOST:$$DB_PORT;
        wait-for-it -t 120 redis-cache:6379;
        wait-for-it -t 120 redis-queue:6379;
        export start=`date +%s`;
        until [[ -n `grep -hs ^ sites/common_site_config.json | jq -r ".db_host // empty"` ]] &&
          [[ -n `grep -hs ^ sites/common_site_config.json | jq -r ".redis_cache // empty"` ]] &&
          [[ -n `grep -hs ^ sites/common_site_config.json | jq -r ".redis_queue // empty"` ]];
        do
          echo "Waiting for sites/common_site_config.json ...";
          sleep 5;
          if (( `date +%s`-start > 120 )); then
            echo "Timed out waiting for common_site_config.json"; exit 1;
          fi
        done;
        [[ -d "sites/$${SITE_NAME}" ]] && echo "$${SITE_NAME} already exists" && exit 0;
        bench new-site
          --mariadb-user-host-login-scope='%'
          --admin-password=$${ADMIN_PASSWORD}
          --db-root-username=root
          --db-root-password=$${DB_ROOT_PASSWORD}
          $${INSTALL_APP_ARGS}
          $${SITE_NAME};
    environment:
      SITE_NAME: ${SITE_NAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-3306}
      DB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      INSTALL_APP_ARGS: ${INSTALL_APP_ARGS:---install-app erpnext --install-app lms}
    volumes:
      - sites:/home/frappe/frappe-bench/sites
    networks:
      - bench-network

  # ── migration ────────────────────────────────────────────────
  # Runs bench migrate across all sites (with maintenance mode).
  # Set MIGRATE=1 after image upgrades, then back to 0.
  migration:
    <<: *custom_image
    deploy:
      mode: replicated
      replicas: ${MIGRATE:-0}
      restart_policy:
        condition: none
    entrypoint: ["bash", "-c"]
    command:
      - >
        bench --site all set-config -p maintenance_mode 1;
        bench --site all set-config -p pause_scheduler 1;
        bench --site all migrate;
        bench --site all set-config -p maintenance_mode 0;
        bench --site all set-config -p pause_scheduler 0;
    volumes:
      - sites:/home/frappe/frappe-bench/sites
    networks:
      - bench-network

  # ── backend (Gunicorn) ───────────────────────────────────────
  backend:
    <<: *custom_image
    depends_on:
      configurator:
        condition: service_completed_successfully
        required: false
    volumes:
      - sites:/home/frappe/frappe-bench/sites
    networks:
      - bench-network
    healthcheck:
      test: ["CMD", "wait-for-it", "0.0.0.0:8000"]
      interval: 2s
      timeout: 10s
      retries: 30

  # ── frontend (Nginx) ─────────────────────────────────────────
  # Exposed on HTTP_PUBLISH_PORT (default 8080).
  # Dokploy's built-in Traefik proxies this port → HTTPS.
  frontend:
    <<: *custom_image
    command: ["nginx-entrypoint.sh"]
    depends_on:
      backend:
        condition: service_started
        required: true
      websocket:
        condition: service_started
        required: true
    environment:
      BACKEND: backend:8000
      SOCKETIO: websocket:9000
      FRAPPE_SITE_NAME_HEADER: ${FRAPPE_SITE_NAME_HEADER:-$$host}
      UPSTREAM_REAL_IP_ADDRESS: ${UPSTREAM_REAL_IP_ADDRESS:-127.0.0.1}
      UPSTREAM_REAL_IP_HEADER: ${UPSTREAM_REAL_IP_HEADER:-X-Forwarded-For}
      UPSTREAM_REAL_IP_RECURSIVE: ${UPSTREAM_REAL_IP_RECURSIVE:-off}
      PROXY_READ_TIMEOUT: ${PROXY_READ_TIMEOUT:-120}
      CLIENT_MAX_BODY_SIZE: ${CLIENT_MAX_BODY_SIZE:-50m}
    volumes:
      - sites:/home/frappe/frappe-bench/sites
    ports:
      - "${HTTP_PUBLISH_PORT:-8080}:8080"
    networks:
      - bench-network
    healthcheck:
      test: ["CMD", "wait-for-it", "0.0.0.0:8080"]
      interval: 2s
      timeout: 30s
      retries: 30

  # ── websocket (Socket.IO) ────────────────────────────────────
  websocket:
    <<: *custom_image
    command: ["node", "/home/frappe/frappe-bench/apps/frappe/socketio.js"]
    depends_on:
      configurator:
        condition: service_completed_successfully
        required: false
    volumes:
      - sites:/home/frappe/frappe-bench/sites
    networks:
      - bench-network
    healthcheck:
      test: ["CMD", "wait-for-it", "0.0.0.0:9000"]
      interval: 2s
      timeout: 10s
      retries: 30

  # ── queue workers ────────────────────────────────────────────
  queue-default:
    <<: *custom_image
    command: ["bench", "worker", "--queue", "default"]
    depends_on:
      configurator:
        condition: service_completed_successfully
        required: false
    volumes:
      - sites:/home/frappe/frappe-bench/sites
    networks:
      - bench-network
    healthcheck:
      test: ["CMD", "wait-for-it", "redis-queue:6379"]
      interval: 2s
      timeout: 10s
      retries: 30

  queue-long:
    <<: *custom_image
    command: ["bench", "worker", "--queue", "long"]
    depends_on:
      configurator:
        condition: service_completed_successfully
        required: false
    volumes:
      - sites:/home/frappe/frappe-bench/sites
    networks:
      - bench-network
    healthcheck:
      test: ["CMD", "wait-for-it", "redis-queue:6379"]
      interval: 2s
      timeout: 10s
      retries: 30

  queue-short:
    <<: *custom_image
    command: ["bench", "worker", "--queue", "short"]
    depends_on:
      configurator:
        condition: service_completed_successfully
        required: false
    volumes:
      - sites:/home/frappe/frappe-bench/sites
    networks:
      - bench-network
    healthcheck:
      test: ["CMD", "wait-for-it", "redis-queue:6379"]
      interval: 2s
      timeout: 10s
      retries: 30

  # ── scheduler ────────────────────────────────────────────────
  scheduler:
    <<: *custom_image
    command: ["bench", "schedule"]
    depends_on:
      configurator:
        condition: service_completed_successfully
        required: false
    volumes:
      - sites:/home/frappe/frappe-bench/sites
    networks:
      - bench-network
    healthcheck:
      test: ["CMD", "wait-for-it", "redis-queue:6379"]
      interval: 2s
      timeout: 10s
      retries: 30

  # ── MariaDB 10.6 ─────────────────────────────────────────────
  # Set ENABLE_DB=0 to use an external DB instead.
  db:
    image: mariadb:10.6
    deploy:
      mode: replicated
      replicas: ${ENABLE_DB:-1}
      restart_policy:
        condition: always
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
      - --skip-innodb-read-only-compressed
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - bench-network
    healthcheck:
      test: mysqladmin ping -h localhost --password=${DB_ROOT_PASSWORD}
      interval: 1s
      retries: 20

  # ── Redis ─────────────────────────────────────────────────────
  # Three separate instances: cache / queue / socketio
  redis-cache:
    image: redis:7-alpine
    deploy:
      restart_policy:
        condition: always
    volumes:
      - redis-cache-data:/data
    networks:
      - bench-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 3

  redis-queue:
    image: redis:7-alpine
    deploy:
      restart_policy:
        condition: always
    volumes:
      - redis-queue-data:/data
    networks:
      - bench-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 3

  redis-socketio:
    image: redis:7-alpine
    deploy:
      restart_policy:
        condition: always
    volumes:
      - redis-socketio-data:/data
    networks:
      - bench-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 3

volumes:
  db-data:
  redis-cache-data:
  redis-queue-data:
  redis-socketio-data:
  sites:
    driver_opts:
      type: ${SITE_VOLUME_TYPE:-none}
      o: ${SITE_VOLUME_OPTS:-bind}
      device: ${SITE_VOLUME_DEV:-./sites}

networks:
  bench-network:
