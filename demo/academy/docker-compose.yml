version: "3.8"

name: ${COMPOSE_PROJECT_NAME}

services:
  mariadb:
    image: mariadb:${MARIADB_VERSION}
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
      - --skip-innodb-read-only-compressed
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -uroot -p${MYSQL_ROOT_PASSWORD} || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  redis:
    image: redis:${REDIS_VERSION}
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 20

  frappe-lms:
    image: ${FRAPPE_IMAGE}
    restart: unless-stopped
    working_dir: /home/frappe
    environment:
      SHELL: /bin/bash
      SITE_NAME: ${SITE_NAME}
      DB_HOST: mariadb
      DB_PORT: "3306"
      REDIS_URL: redis://redis:6379
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      INSTALL_APPS: ${INSTALL_APPS}
    command: >
      bash -lc '
        set -e

        if [ -d "/home/frappe/frappe-bench/apps/frappe" ]; then
          echo "Existing bench found. Starting LMS..."
          cd /home/frappe/frappe-bench
          bench start
          exit 0
        fi

        echo "Creating new bench for LMS..."

        export PATH="${NVM_DIR}/versions/node/v${NODE_VERSION_DEVELOP}/bin/:${PATH}"

        bench init --skip-redis-config-generation /home/frappe/frappe-bench
        cd /home/frappe/frappe-bench

        bench set-mariadb-host ${DB_HOST}
        bench set-redis-cache-host ${REDIS_URL}
        bench set-redis-queue-host ${REDIS_URL}
        bench set-redis-socketio-host ${REDIS_URL}

        sed -i "/redis/d" ./Procfile || true
        sed -i "/watch/d" ./Procfile || true

        IFS="," read -ra APPS <<< "${INSTALL_APPS}"
        for app in "${APPS[@]}"; do
          app_trimmed="$(echo "$app" | xargs)"
          if [ -n "$app_trimmed" ]; then
            bench get-app "$app_trimmed"
          fi
        done

        bench new-site ${SITE_NAME} \
          --force \
          --mariadb-root-password ${MYSQL_ROOT_PASSWORD} \
          --admin-password ${ADMIN_PASSWORD} \
          --no-mariadb-socket

        for app in "${APPS[@]}"; do
          app_trimmed="$(echo "$app" | xargs)"
          if [ -n "$app_trimmed" ]; then
            app_name="$(basename "$app_trimmed" .git)"
            app_name="$(echo "$app_name" | sed "s#https://github.com/##" | awk -F/ "{print \$NF}")"
            bench --site ${SITE_NAME} install-app "$app_name"
          fi
        done

        bench --site ${SITE_NAME} set-config developer_mode 0
        bench --site ${SITE_NAME} clear-cache
        bench use ${SITE_NAME}

        echo "LMS setup complete. Starting bench..."
        bench start
      '
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - frappe_bench_data:/home/frappe/frappe-bench
    ports:
      - "${FRAPPE_HTTP_PORT}:8000"
      - "${SOCKETIO_PORT}:9000"

volumes:
  mariadb_data:
  redis_data:
  frappe_bench_data: